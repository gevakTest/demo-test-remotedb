<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Product CRUD</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Товари</h2>
<a th:href="@{/products/new}" class="btn btn-primary mb-3">Додати новий</a>
<table class="table table-bordered">
  <thead>
  <tr>
    <th>ID</th>
    <th>Назва</th>
    <th>Ціна</th>
    <th>Дії</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="p : ${products}">
    <td th:text="${p.id}"></td>
    <td th:text="${p.name}"></td>
    <td th:text="${p.price}"></td>
    <td>
      <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Edit</a>
      <a th:href="@{/products/delete/{id}(id=${p.id})}" class="btn btn-sm btn-danger">Delete</a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
