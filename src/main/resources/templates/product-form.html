<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Збереження товару</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 th:text="${product.id == null} ? 'Додати товар' : 'Редагувати товар'"></h2>
    <hr>

    <form th:action="@{/products/save}" th:object="${product}" method="post">
      <input type="hidden" th:field="*{id}">

      <div class="mb-3">
        <label class="form-label">Назва товару</label>
        <input type="text" th:field="*{name}" class="form-control" placeholder="Введіть назву" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Ціна</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control" placeholder="0.00" required>
      </div>

      <div class="mt-4">
        <button type="submit" class="btn btn-success">Зберегти</button>
        <a th:href="@{/products}" class="btn btn-secondary">Скасувати</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
